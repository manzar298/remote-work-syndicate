<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opportunities - Remote Work Syndicate</title>
  
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="relative min-h-screen bg-[#f3f2f7] pb-24 antialiased selection:bg-purple-500/20" style="font-family: 'Plus Jakarta Sans', sans-serif;">
  
  <div class="absolute top-0 left-1/4 w-[800px] h-[500px] bg-purple-200/30 opacity-60 blur-[140px] pointer-events-none"></div>
  <div class="absolute top-0 right-1/4 w-[600px] h-[400px] bg-pink-200/20 opacity-50 blur-[120px] pointer-events-none"></div>
  <div class="absolute top-32 left-1/2 -translate-x-1/2 w-[700px] h-[300px] bg-indigo-100/40 opacity-60 blur-[130px] pointer-events-none"></div>

  <header class="relative pt-5 px-4 max-w-6xl mx-auto flex justify-center">
    <nav class="flex items-center justify-between bg-white rounded-full px-6 py-2 shadow-[0_2px_16px_rgba(0,0,0,0.02)] border border-white/80 w-full max-w-[720px] text-[13px] font-medium text-slate-600">
      
      <div class="flex items-center gap-2 group cursor-pointer">
        <div class="w-7 h-7 rounded-lg bg-black text-white flex items-center justify-center font-bold text-xs tracking-tighter shadow-sm group-hover:bg-purple-600 transition-colors duration-300">
          R
        </div>
        <span class="text-[15px] font-bold text-slate-900 tracking-tight">
          WS<span class="text-purple-600 font-extrabold">.</span>
        </span>
      </div>

      <div class="hidden sm:flex items-center gap-5">
        <a href="#" class="text-black font-semibold">Opportunities</a>
        <a href="#" class="hover:text-black transition-colors">Refer & earn</a>
        <a href="#" class="hover:text-black transition-colors">Reviews</a>
      </div>
      
      <a href="#" class="bg-black text-white px-4 py-1.5 rounded-full font-medium text-[12px] hover:bg-slate-900 transition-all shadow-sm">Apply now</a>
    </nav>
  </header>

  <main class="relative max-w-7xl mx-auto px-6 pt-14">
    <div class="text-center mb-10">
      <h1 class="text-[44px] font-bold text-[#111111] tracking-[-0.03em] mb-4">
        Opportunities
      </h1>
      <p class="text-[15.5px] text-slate-500 font-normal max-w-[620px] mx-auto leading-[1.6] tracking-tight mb-4">
        We offer remote opportunities across many domains, including engineering, finance, healthcare, legal, and more
      </p>
      <div id="roles-counter" class="text-[12px] font-semibold text-purple-600 tracking-wide uppercase">
        Loading opportunities...
      </div>
    </div>

    <div id="jobs-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-[1120px] mx-auto">
      </div>
  </main>

  <script>
    async function fetchLiveJobs() {
      const gridContainer = document.getElementById('jobs-grid');
      const counterContainer = document.getElementById('roles-counter');
      
      try {
        // Calls the secure backend Netlify Serverless AI Function
        const response = await fetch('/.netlify/functions/job-agent');
        const optimizedJobs = await response.json();
        
        counterContainer.innerText = `${optimizedJobs.length} ${optimizedJobs.length === 1 ? 'role' : 'roles'} found`;
        
        if(optimizedJobs.length === 0) {
          gridContainer.innerHTML = `<p class="col-span-full text-center text-slate-400 py-12 text-sm bg-white rounded-2xl border border-dashed border-slate-200">No positions available right now.</p>`;
          return;
        }

        gridContainer.innerHTML = "";
        
        optimizedJobs.forEach(job => {
          const skillsHTML = job.skills.map(skill => 
            `<span class="px-2.5 py-1 bg-[#f0f2f5] text-slate-700 rounded-md text-[11.5px] font-medium">${skill}</span>`
          ).join('');

          const cardHTML = `
            <div onclick="window.open('${job.applyLink}', '_blank')" class="bg-white rounded-[24px] p-[26px] shadow-[0_8px_30px_rgba(0,0,0,0.015)] border border-white/80 flex flex-col justify-between min-h-[255px] hover:shadow-[0_12px_40px_rgba(0,0,0,0.03)] hover:border-slate-300/40 transition-all duration-300 group cursor-pointer text-left">
              <div class="space-y-3.5">
                <span class="text-[11.5px] font-medium text-slate-400 block">${job.datePosted}</span>
                <h2 class="text-[18px] font-bold text-black tracking-tight leading-snug">${job.title}</h2>
                <div class="space-y-2 pt-1">
                  <span class="text-[11px] font-medium text-slate-400 block tracking-wide">Required skills</span>
                  <div class="flex flex-wrap gap-1.5">${skillsHTML}</div>
                </div>
              </div>
              <div class="flex items-center justify-between pt-3 mt-4 border-t border-slate-50">
                <span class="text-[13.5px] font-bold text-slate-900 tracking-tight">Pay: ${job.pay}</span>
                <div class="w-[38px] h-[38px] rounded-full border border-slate-200 flex items-center justify-center text-slate-400 bg-white group-hover:border-slate-400 group-hover:text-black shadow-[0_2px_6px_rgba(0,0,0,0.01)] transition-all duration-200">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" /></svg>
                </div>
              </div>
            </div>
          `;
          gridContainer.innerHTML += cardHTML;
        });

      } catch (error) {
        counterContainer.innerText = "Agent synchronization error";
      }
    }

    // Initialize application execution
    fetchLiveJobs();
  </script>
</body>
</html>
